services:
  rust-service:
    build:
      context: ./ml
    restart: unless-stopped
    networks:
      - backend
    ports:
      - "3001:3001"
    volumes:
      - sqlite_data:/data
    environment:
      DATA_DIR: /data
      ML_SERVICE_URL: http://ml-service:8000
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3001/api/graph/status"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  ml-service:
    build:
      context: ./ml_service
    restart: unless-stopped
    networks:
      - backend
    ports:
      - "8000:8000"
    volumes:
      - huggingface_cache:/root/.cache/huggingface
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  java-backend:
    build:
      context: ./java_backend
    restart: unless-stopped
    networks:
      - backend
    ports:
      - "8080:8080"
    environment:
      RUST_SERVICE_URL: http://rust-service:3001
      ML_SERVICE_URL: http://ml-service:8000
    depends_on:
      rust-service:
        condition: service_healthy
      ml-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    networks:
      - backend
    ports:
      - "80:80"
    depends_on:
      java-backend:
        condition: service_healthy

networks:
  backend:
    driver: bridge

volumes:
  huggingface_cache:
  sqlite_data:        # persistent SQLite DB — survives container restarts
